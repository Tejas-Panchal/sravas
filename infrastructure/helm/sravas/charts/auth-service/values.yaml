nameOverride: ""
component: backend
replicas: 1

image:
  repository: sravas-auth-service
  tag: latest

service:
  port: 3001

configMap:
  enabled: true
  name: auth-service-config

envSecrets:
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: sravas-secrets
        key: jwt-secret
  - name: JWT_REFRESH_SECRET
    valueFrom:
      secretKeyRef:
        name: sravas-secrets
        key: jwt-refresh-secret

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 5

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
