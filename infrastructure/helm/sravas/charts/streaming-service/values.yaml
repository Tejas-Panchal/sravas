nameOverride: ""
component: backend
replicas: 1

image:
  repository: sravas-streaming-service
  tag: latest

service:
  port: 3004

configMap:
  enabled: true
  name: streaming-service-config

envSecrets: []

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 5

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
