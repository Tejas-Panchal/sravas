nameOverride: ""
component: frontend
replicas: 1

image:
  repository: sravas-frontend
  tag: latest

service:
  port: 80

configMap:
  enabled: false
  name: ""

envSecrets: []

livenessProbe:
  path: /
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  path: /
  initialDelaySeconds: 5
  periodSeconds: 5

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
