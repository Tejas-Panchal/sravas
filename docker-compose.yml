x-go-service: &go-service
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "curl -f http://localhost:$${PORT}/health || exit 1"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 30s

x-infra: &infra
  restart: unless-stopped

services:
  frontend:
    build: frontend
    ports: ["80:80"]
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks: [sravas-net]
    restart: unless-stopped

  api-gateway:
    build: services/api-gateway
    ports: ["8000:8000"]
    environment:
      PORT: "8000"
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      UPLOAD_SERVICE_URL: http://upload-service:3003
      STREAMING_SERVICE_URL: http://streaming-service:3004
      SEARCH_SERVICE_URL: http://search-service:3005
      COMMENT_SERVICE_URL: http://comment-service:3006
      ANALYTICS_SERVICE_URL: http://analytics-service:3007
      NOTIFICATION_SERVICE_URL: http://notification-service:3008
    depends_on:
      auth-service: { condition: service_healthy }
      user-service: { condition: service_healthy }
      upload-service: { condition: service_healthy }
      streaming-service: { condition: service_healthy }
      search-service: { condition: service_healthy }
      comment-service: { condition: service_healthy }
      analytics-service: { condition: service_healthy }
      notification-service: { condition: service_healthy }
    networks: [sravas-net]
    <<: *go-service

  auth-service:
    build: services/auth-service
    ports: ["3001:3001"]
    environment:
      PORT: "3001"
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
    depends_on:
      redis: { condition: service_healthy }
    networks: [sravas-net]
    <<: *go-service

  user-service:
    build: services/user-service
    ports: ["3002:3002"]
    environment:
      PORT: "3002"
      DATABASE_URL: postgresql://user:password@postgres:5432/sravas
    depends_on:
      postgres: { condition: service_healthy }
    networks: [sravas-net]
    <<: *go-service

  upload-service:
    build: services/upload-service
    ports: ["3003:3003"]
    environment:
      PORT: "3003"
      KAFKA_BROKERS: kafka:9092
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-sravas-videos}
    depends_on:
      kafka: { condition: service_healthy }
    networks: [sravas-net]
    <<: *go-service

  streaming-service:
    build: services/streaming-service
    ports: ["3004:3004"]
    environment:
      PORT: "3004"
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [sravas-net]
    <<: *go-service

  search-service:
    build: services/search-service
    ports: ["3005:3005"]
    environment:
      PORT: "3005"
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      elasticsearch: { condition: service_healthy }
    networks: [sravas-net]
    <<: *go-service

  comment-service:
    build: services/comment-service
    ports: ["3006:3006"]
    environment:
      PORT: "3006"
      MONGODB_URL: mongodb://mongodb:27017/sravas
    depends_on:
      mongodb: { condition: service_healthy }
    networks: [sravas-net]
    <<: *go-service

  analytics-service:
    build: services/analytics-service
    ports: ["3007:3007"]
    environment:
      PORT: "3007"
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka: { condition: service_healthy }
    networks: [sravas-net]
    <<: *go-service

  notification-service:
    build: services/notification-service
    ports: ["3008:3008"]
    environment:
      PORT: "3008"
      KAFKA_BROKERS: kafka:9092
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
    depends_on:
      kafka: { condition: service_healthy }
    networks: [sravas-net]
    <<: *go-service

  scheduler-service:
    build: services/scheduler-service
    ports: ["3009:3009"]
    environment:
      PORT: "3009"
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://user:password@postgres:5432/sravas
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [sravas-net]
    <<: *go-service

  postgres:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: sravas
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d sravas"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes: [postgres-data:/var/lib/postgresql/data]
    networks: [sravas-net]
    <<: *infra

  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes: [mongo-data:/data/db]
    networks: [sravas-net]
    <<: *infra

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes: [redis-data:/data]
    networks: [sravas-net]
    <<: *infra

  elasticsearch:
    image: elasticsearch:8.11.3
    ports: ["9200:9200"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes: [es-data:/usr/share/elasticsearch/data]
    networks: [sravas-net]
    <<: *infra

  kafka:
    image: confluentinc/cp-kafka:7.5
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      zookeeper: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks: [sravas-net]
    <<: *infra

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [sravas-net]
    <<: *infra

networks:
  sravas-net:

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  es-data:
